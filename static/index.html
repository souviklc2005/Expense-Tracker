<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazonian Expense Tracker</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="auth-container" class="container centered">
        <div class="card">
            <h1>Expense Tracker</h1>
            <div class="tabs">
                <button id="tab-login" class="active" onclick="showAuth('login')">Login</button>
                <button id="tab-register" onclick="showAuth('register')">Register</button>
            </div>
            <form id="auth-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" id="auth-btn">Login</button>
            </form>
            <p id="auth-msg"></p>
        </div>
    </div>

    <div id="dashboard-container" class="hidden">
        <nav>
            <h2>💰 My Finances</h2>
            <div class="nav-right">
                <span id="user-display"></span>
                <button onclick="logout()" class="btn-outline">Logout</button>
            </div>
        </nav>

        <div class="main-content">
            <div class="stats-grid">
                <div class="card">
                    <h3>Total Spent (Month)</h3>
                    <h2 id="total-spent">₹0.00</h2>
                </div>
                <div class="card">
                    <h3>Budget Limit</h3>
                    <div class="budget-control">
                        <h2 id="budget-limit">₹0.00</h2>
                        <button onclick="setBudget()" class="btn-small">Edit</button>
                    </div>
                </div>
                <div class="card" id="alert-card">
                    <h3>Status</h3>
                    <h2 id="budget-status">Safe</h2>
                </div>
            </div>

            <div class="content-grid">
                <div class="card">
                    <h3>Add Expense</h3>
                    <form id="expense-form">
                        <input type="date" id="ex-date" required>
                        <input type="number" id="ex-amount" placeholder="Amount (₹)" step="0.01" required>
                        <input type="text" id="ex-desc" placeholder="Description">
                        <select id="ex-category">
                            <option value="Food">Food</option>
                            <option value="Rent">Rent</option>
                            <option value="Travel">Travel</option>
                            <option value="Utilities">Utilities</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Other">Other</option>
                        </select>
                        <button type="submit">Add Transaction</button>
                    </form>
                </div>

                <div class="card">
                    <h3>Spending by Category</h3>
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>

            <div class="card full-width">
                <h3>Recent Transactions</h3>
                <table id="expense-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Category</th>
                            <th>Description</th>
                            <th>Amount</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="expense-list"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
